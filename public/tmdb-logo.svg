<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 276 32" role="img" aria-label="The Movie Database (TMDB)">
  <!--
    Simplified TMDB attribution logo.
    Source: https://www.themoviedb.org/about/logos-attribution
    Used for required API attribution per TMDB terms of use.
  -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#01b4e4"/>
  <text x="16" y="22" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#ffffff">T</text>
  <text x="40" y="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="currentColor">
    <tspan>TMDB</tspan>
  </text>
</svg>
